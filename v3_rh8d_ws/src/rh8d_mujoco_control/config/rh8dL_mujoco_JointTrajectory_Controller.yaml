controller_manager:
  ros__parameters:
    update_rate: 1000

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    hand_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

hand_trajectory_controller:
  ros__parameters:
    joints:
      - pos_forearm
      - pos_palm_axis
      - pos_palmL
      - pos_thumb_axis
      - pos_thumb_tendon
      - pos_index_tendon
      - pos_middle_tendon
      - pos_ring_small_tendon

    command_interfaces:
      - position

    state_interfaces:
      - position

    allow_partial_joints_goal: false
    open_loop_control: true